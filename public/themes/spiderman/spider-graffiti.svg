<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor">
  <!-- Spray paint central glow/fade backdrop -->
  <circle cx="100" cy="100" r="45" fill="currentColor" opacity="0.15" filter="blur(10px)" />
  
  <!-- Splatters / Drips (Graffiti feel) -->
  <circle cx="65" cy="45" r="4" opacity="0.8" />
  <circle cx="55" cy="58" r="2.5" opacity="0.7" />
  <circle cx="140" cy="60" r="3" opacity="0.85" />
  <circle cx="148" cy="72" r="1.5" opacity="0.9" />
  <circle cx="78" cy="155" r="2" opacity="0.75" />
  <circle cx="124" cy="162" r="3.5" opacity="0.8" />
  <circle cx="100" cy="175" r="2" opacity="0.9" />
  
  <!-- Paint drips -->
  <path d="M72 120 C 70 140, 68 150, 68 155 C 68 157, 70 159, 71 159 C 72 159, 73 157, 73 155 C 74 140, 75 130, 72 120 Z" opacity="0.9"/>
  <path d="M128 115 C 130 135, 131 145, 132 152 C 132 154, 134 156, 135 156 C 136 156, 137 154, 136 152 C 134 145, 132 135, 128 115 Z" opacity="0.9"/>
  <path d="M100 135 C 100 150, 99 160, 99 166 C 99 168, 101 170, 102 170 C 103 170, 104 168, 103 166 C 102 160, 101 150, 100 135 Z" opacity="0.95"/>
  
  <!-- Main Spider Logo - Miles Morales style (angular, sharp, aggressive) -->
  <g transform="translate(100, 95) scale(0.9)">
    <!-- Body -->
    <path d="M0 -35 L8 -22 L10 -8 L0 5 L-10 -8 L-8 -22 Z" />
    <path d="M0 -5 L14 15 L12 35 L0 45 L-12 35 L-14 15 Z" />
    <!-- Head -->
    <path d="M0 -37 L5 -45 L0 -49 L-5 -45 Z" />
    
    <!-- Legs -->
    <!-- Leg 1 (Top Left) -->
    <path d="M-8 -26 C-22 -40, -32 -48, -42 -40 C-38 -32, -26 -28, -10 -20" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Leg 2 (Top Right) -->
    <path d="M8 -26 C22 -40, 32 -48, 42 -40 C38 -32, 26 -28, 10 -20" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Leg 3 (Mid Top Left) -->
    <path d="M-9 -16 C-30 -22, -44 -24, -52 -12 C-45 -8, -32 -10, -10 -11" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Leg 4 (Mid Top Right) -->
    <path d="M9 -16 C30 -22, 44 -24, 52 -12 C45 -8, 32 -10, 10 -11" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Leg 5 (Mid Bottom Left) -->
    <path d="M-12 12 C-34 16, -46 25, -48 42 C-42 34, -28 28, -12 20" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Leg 6 (Mid Bottom Right) -->
    <path d="M12 12 C34 16, 46 25, 48 42 C42 34, 28 28, 12 20" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Leg 7 (Bottom Left) -->
    <path d="M-11 26 C-28 42, -32 55, -28 72 C-26 60, -20 50, -8 34" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Leg 8 (Bottom Right) -->
    <path d="M11 26 C28 42, 32 55, 28 72 C26 60, 20 50, 8 34" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
