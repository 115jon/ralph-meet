name = "ralph-meet"
main = "custom-server-entry.ts"
compatibility_date = "2026-02-28"
compatibility_flags = [
    "nodejs_compat",
    "no_handle_cross_request_promise_resolution",
]

# ── Secrets ───────────────────────────────────────────────────────────────
# Set these via `wrangler secret put <NAME>` (never commit secret values):
#   wrangler secret put CALLS_APP_SECRET
#   wrangler secret put KLIPY_API_KEY
#   wrangler secret put TURN_TOKEN_SECRET
#   wrangler secret put RALPH_AUTH_WEBHOOK_SECRET  # only if /api/auth/sync webhooks are enabled

[vars]
CALLS_APP_ID = "19e070aa92dd233340bfb829a1ffd742"
TURN_TOKEN_ID = "7355d949dedf888e6d89a5298f3ffde7"
KOVA_AUTH_URL = "https://auth.115jon.site"
VITE_KOVA_AUTH_URL = "https://auth.115jon.site"
VITE_KOVA_AUTH_PUBLISHABLE_KEY = "pk_dev_fhygLR-eApZ4HvSfu-v-LEGFp7WAsgkLRhlveveNzhk"

# ── Durable Objects (hosted in auxiliary worker) ────────────────────────
# script_name tells the runtime these DO classes live in a separate worker,
# preventing module-level I/O context conflicts in dev mode.

# Main Gateway — room presence & state
[[durable_objects.bindings]]
name = "MEETING_ROOM"
class_name = "MeetingRoom"
script_name = "ralph-meet-do"

# Voice Gateway — media signaling
[[durable_objects.bindings]]
name = "VOICE_ROOM"
class_name = "VoiceRoom"
script_name = "ralph-meet-do"

# Rate Limiter — global token bucket
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDO"
script_name = "ralph-meet-do"

# ── Migrations ───────────────────────────────────────────────────────────
# Migrations are defined in worker/wrangler.toml (where the DO classes live)

# ── D1 Database ──────────────────────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "ralph-chat-db"
database_id = "0b10b6c3-b5c5-488d-a95d-f9a8e7433813"

# ── KV Cache ─────────────────────────────────────────────────────────

[[kv_namespaces]]
binding = "CACHE"
id = "0ee41653bb684978af83430e53623019"

# ── R2 Storage ───────────────────────────────────────────────────────

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ralph-chat-attachments"

# ── Local Development ──────────────────────────────────────────────────

[dev]
port = 8888

# ── Observability ────────────────────────────────────────────────────────

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false
