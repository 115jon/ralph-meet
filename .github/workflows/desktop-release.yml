name: "Desktop Release"

on:
  push:
    tags:
      - "v*"
  # Allow manual triggering from the Actions tab (useful for debugging)
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to rebuild and publish (for example v1.14.0)"
        required: true
        type: string

env:
  CARGO_INCREMENTAL: 0
  CEF_PATH: D:\cef
  RALPH_GAME_CAPTURE_HOOK: "1"
  RALPH_CAPTURE_POLICY: "wgc-enabled"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  VITE_RALPH_CAPTURE_POLICY: "wgc-enabled"

jobs:
  build:
    permissions:
      contents: write

    # Windows-only: macOS and Linux builds are excluded until those
    # platforms are ready for release distribution.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--config src-tauri/tauri.deployed.conf.json --features cef,native-screen-share,game-capture-hook"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          submodules: recursive

      # ── Rust ────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      # Cache Cargo registry + build artifacts keyed to Cargo.lock.
      # On Windows this alone saves ~10 min per run after the first.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      # ── Node.js + pnpm ──────────────────────────────────────────────
      # pnpm must be set up BEFORE setup-node so that the node cache
      # key can include the pnpm lockfile hash.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10 # match the version used locally

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            desktop/pnpm-lock.yaml

      # ── C# installer ────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ── Install dependencies ─────────────────────────────────────────
      # We only need dependencies for the desktop app and its workspace dependencies (e.g. @kova/react).
      # Filtering the installation avoids downloading huge unrelated packages like workerd / wrangler.
      - name: Configure pnpm network settings
        run: |
          pnpm config set fetch-retries 5
          pnpm config set fetch-retry-mintimeout 20000
          pnpm config set fetch-retry-maxtimeout 120000

      - name: Install desktop dependencies
        run: pnpm install --filter ralph-meet-desktop... --frozen-lockfile

      - name: Build local workspace dependencies
        run: pnpm --filter @kova/react build

      # ── Download Custom CEF ──────────────────────────────────────────
      - name: Download custom CEF
        run: |
          gh release download cef-build-assets --repo ${{ github.repository }} --pattern "cef-windows-x64.zip" --dir cef-temp
          Expand-Archive -Path cef-temp/cef-windows-x64.zip -DestinationPath D:\cef
          Remove-Item -Recurse -Force cef-temp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OBS game capture binaries from source
        shell: pwsh
        run: |
          ./desktop/scripts/build-capture-fork.ps1 -Arch both -Config Release -FetchDetours

          $requiredHookDlls = @(
            "desktop/src-tauri/resources/obs-capture/graphics-hook64.dll",
            "desktop/src-tauri/resources/obs-capture/graphics-hook32.dll"
          )
          $missingHookDlls = $requiredHookDlls | Where-Object {
            -not (Test-Path -LiteralPath $_)
          }

          if ($missingHookDlls.Count -gt 0) {
            throw "Capture fork build did not produce required hook DLLs: $($missingHookDlls -join ', ')"
          }

      - name: Cache cargo-tauri
        id: cache-cargo-tauri
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: ${{ runner.os }}-cargo-tauri-cef-v1

      - name: Install cargo-tauri fork CLI
        if: steps.cache-cargo-tauri.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/cef

      - name: Sync CEF payload to target release directory
        run: |
          $TargetDir = "desktop/src-tauri/target/release"
          New-Item -ItemType Directory -Force -Path $TargetDir | Out-Null
          
          # Copy CEF files
          $cefFiles = @(
              "libcef.dll",
              "chrome_elf.dll",
              "icudtl.dat",
              "v8_context_snapshot.bin",
              "chrome_100_percent.pak",
              "chrome_200_percent.pak",
              "resources.pak",
              "d3dcompiler_47.dll",
              "dxil.dll",
              "dxcompiler.dll",
              "libEGL.dll",
              "libGLESv2.dll",
              "vk_swiftshader.dll",
              "vk_swiftshader_icd.json",
              "vulkan-1.dll",
              "bootstrap.exe",
              "bootstrapc.exe"
          )
          
          foreach ($file in $cefFiles) {
              Copy-Item -Path "D:\cef\$file" -Destination "$TargetDir\$file" -Force
          }
          
          # Copy locales
          $dstLocales = "$TargetDir\locales"
          New-Item -ItemType Directory -Force -Path $dstLocales | Out-Null
          Copy-Item -Path "D:\cef\locales\*" -Destination $dstLocales -Force -Recurse

      # ── Build & Release ─────────────────────────────────────────────
      - name: Build Tauri app binary
        shell: pwsh
        run: |
          Set-Location desktop
          cargo tauri build --config src-tauri/tauri.deployed.conf.json --features cef,native-screen-share,game-capture-hook --no-bundle

      - name: Build Tauri app payload
        shell: pwsh
        run: |
          $ReleaseDir = "desktop/src-tauri/target/release"
          $PayloadZip = "desktop/installer/Assets/payload.zip"

          if (-not (Test-Path -LiteralPath $ReleaseDir)) {
            throw "Release directory not found: $ReleaseDir"
          }

          if (Test-Path -LiteralPath $PayloadZip) {
            Remove-Item -LiteralPath $PayloadZip -Force
          }

          $stageDir = Join-Path $env:TEMP "RalphMeetStage"
          if (Test-Path $stageDir) { Remove-Item -Path $stageDir -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          # Copy only the built executable renamed to RalphMeet.exe
          Copy-Item -LiteralPath (Join-Path $ReleaseDir "ralph-meet-desktop.exe") -Destination (Join-Path $stageDir "RalphMeet.exe") -Force

          # Copy CEF DLLs and assets
          $cefFiles = @(
              "libcef.dll",
              "chrome_elf.dll",
              "icudtl.dat",
              "v8_context_snapshot.bin",
              "chrome_100_percent.pak",
              "chrome_200_percent.pak",
              "resources.pak",
              "d3dcompiler_47.dll",
              "dxil.dll",
              "dxcompiler.dll",
              "libEGL.dll",
              "libGLESv2.dll",
              "vk_swiftshader.dll",
              "vk_swiftshader_icd.json",
              "vulkan-1.dll",
              "bootstrap.exe",
              "bootstrapc.exe"
          )
          foreach ($file in $cefFiles) {
              Copy-Item -LiteralPath (Join-Path $ReleaseDir $file) -Destination (Join-Path $stageDir $file) -Force
          }

          # Copy locales directory
          $srcLocales = Join-Path $ReleaseDir "locales"
          $dstLocales = Join-Path $stageDir "locales"
          New-Item -ItemType Directory -Force -Path $dstLocales | Out-Null
          Get-ChildItem -Path $srcLocales -File | ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $dstLocales $_.Name) -Force
          }

          # Copy obs-capture directory if present
          $srcObsCapture = Join-Path $ReleaseDir "obs-capture"
          if (Test-Path $srcObsCapture) {
              Copy-Item -Path $srcObsCapture -Destination $stageDir -Recurse -Force
          }

          if (Get-Command 7z -ErrorAction SilentlyContinue) {
              & 7z a -tzip -mx=9 $PayloadZip "$stageDir\*" | Out-Null
          } else {
              Compress-Archive -Path "$stageDir\*" -DestinationPath $PayloadZip -Force
          }

          Remove-Item -Path $stageDir -Recurse -Force

      - name: Build C# installer
        shell: pwsh
        run: |
          $TauriConf = Get-Content -Raw -Path "desktop/src-tauri/tauri.conf.json" | ConvertFrom-Json
          $Version = $TauriConf.version
          $Publisher = $TauriConf.bundle.publisher
          $ProductName = $TauriConf.productName
          $InstallerDisplayName = $TauriConf.app.windows[0].title
          dotnet build desktop/installer/installer.csproj -c Release -p:Version=$Version -p:InformationalVersion=$Version -p:Company="$Publisher" -p:Product="$InstallerDisplayName Setup"

      - name: Create draft release, sign installer, and upload metadata
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # 1. Create or verify the draft release
          $releaseExists = $false
          try {
              $info = & gh release view $env:RELEASE_TAG -R ${{ github.repository }} 2>$null
              if ($LASTEXITCODE -eq 0) {
                  $releaseExists = $true
              }
          } catch {}

          if (-not $releaseExists) {
              Write-Host "Creating draft release..."
              & gh release create $env:RELEASE_TAG --draft --title "Ralph Meet $env:RELEASE_TAG" --notes "Ralph Meet Release" -R ${{ github.repository }}
          }

          # 2. Sign the installer using cargo tauri signer
          $SetupRenamePath = "desktop/installer/bin/Release/net48/RalphMeetSetup.exe"
          Write-Host "==> Signing RalphMeetSetup.exe..."
          if ($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
              cargo tauri signer sign -k $env:TAURI_SIGNING_PRIVATE_KEY -p $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD $SetupRenamePath
          } else {
              cargo tauri signer sign -k $env:TAURI_SIGNING_PRIVATE_KEY $SetupRenamePath
          }

          # Read signature from the generated .sig file
          $SigPath = "$SetupRenamePath.sig"
          if (-not (Test-Path $SigPath)) {
              throw "Signature file was not generated!"
          }
          $Signature = (Get-Content -Raw -Path $SigPath).Trim()

          # Get version from tauri.conf.json
          $TauriConf = Get-Content -Raw -Path "desktop/src-tauri/tauri.conf.json" | ConvertFrom-Json
          $Version = $TauriConf.version
          
          # Construct the latest.json updater metadata
          $TagName = $env:RELEASE_TAG
          $Repo = "${{ github.repository }}"
          $Url = "https://github.com/$Repo/releases/download/$TagName/RalphMeetSetup.exe"
          $PubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          $Metadata = @{
              version = $Version
              pub_date = $PubDate
              platforms = @{
                  "windows-x86_64" = @{
                      signature = $Signature
                      url = $Url
                  }
              }
          }

          $Metadata | ConvertTo-Json -Depth 5 | Set-Content -Path "desktop/installer/bin/Release/net48/latest.json" -NoNewline
          Write-Host "==> Generated latest.json with version $Version and signature successfully!"

          # 4. Upload artifacts to the release
          $LatestJsonPath = "desktop/installer/bin/Release/net48/latest.json"
          gh release upload $env:RELEASE_TAG $SetupRenamePath --clobber -R ${{ github.repository }}
          gh release upload $env:RELEASE_TAG $LatestJsonPath --clobber -R ${{ github.repository }}

          # 5. Publish the release and mark it as latest
          gh release edit $env:RELEASE_TAG --draft=false --latest -R ${{ github.repository }}
