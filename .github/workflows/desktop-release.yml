name: "Desktop Release"

on:
  push:
    tags:
      - "v*"
  # Allow manual triggering from the Actions tab (useful for debugging)
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CEF_PATH: D:\cef
  RALPH_GAME_CAPTURE_HOOK: "1"
  RALPH_CAPTURE_POLICY: "wgc-enabled"
  VITE_RALPH_CAPTURE_POLICY: "wgc-enabled"

jobs:
  build:
    permissions:
      contents: write

    # Windows-only: macOS and Linux builds are excluded until those
    # platforms are ready for release distribution.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--config src-tauri/tauri.deployed.conf.json --features cef,native-screen-share,game-capture-hook"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Rust ────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      # Cache Cargo registry + build artifacts keyed to Cargo.lock.
      # On Windows this alone saves ~10 min per run after the first.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      # ── Node.js + pnpm ──────────────────────────────────────────────
      # pnpm must be set up BEFORE setup-node so that the node cache
      # key can include the pnpm lockfile hash.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10 # match the version used locally

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            desktop/pnpm-lock.yaml

      # ── Install dependencies ─────────────────────────────────────────
      # We only need dependencies for the desktop app and its workspace dependencies (e.g. @kova/react).
      # Filtering the installation avoids downloading huge unrelated packages like workerd / wrangler.
      - name: Configure pnpm network settings
        run: |
          pnpm config set fetch-retries 5
          pnpm config set fetch-retry-mintimeout 20000
          pnpm config set fetch-retry-maxtimeout 120000

      - name: Install desktop dependencies
        run: pnpm install --filter ralph-meet-desktop... --frozen-lockfile

      - name: Build local workspace dependencies
        run: pnpm --filter @kova/react build

      # ── Download Custom CEF & Capture Binaries ───────────────────────
      - name: Download custom CEF and Game Capture binaries
        run: |
          gh release download cef-build-assets --repo ${{ github.repository }} --pattern "cef-windows-x64.zip" --dir cef-temp
          Expand-Archive -Path cef-temp/cef-windows-x64.zip -DestinationPath D:\cef
          Remove-Item -Recurse -Force cef-temp

          # Download and extract custom OBS game capture hook binaries
          gh release download cef-build-assets --repo ${{ github.repository }} --pattern "obs-capture-binaries.zip" --dir obs-temp
          Expand-Archive -Path obs-temp/obs-capture-binaries.zip -DestinationPath desktop/src-tauri/resources/obs-capture -Force
          Remove-Item -Recurse -Force obs-temp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo-tauri
        id: cache-cargo-tauri
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: ${{ runner.os }}-cargo-tauri-cef-v1

      - name: Install cargo-tauri fork CLI
        if: steps.cache-cargo-tauri.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/cef

      - name: Sync CEF payload to target release directory
        run: |
          $TargetDir = "desktop/src-tauri/target/release"
          New-Item -ItemType Directory -Force -Path $TargetDir | Out-Null
          
          # Copy CEF files
          $cefFiles = @(
              "libcef.dll",
              "chrome_elf.dll",
              "icudtl.dat",
              "v8_context_snapshot.bin",
              "chrome_100_percent.pak",
              "chrome_200_percent.pak",
              "resources.pak",
              "d3dcompiler_47.dll",
              "dxil.dll",
              "dxcompiler.dll",
              "libEGL.dll",
              "libGLESv2.dll",
              "vk_swiftshader.dll",
              "vk_swiftshader_icd.json",
              "vulkan-1.dll",
              "bootstrap.exe",
              "bootstrapc.exe"
          )
          
          foreach ($file in $cefFiles) {
              Copy-Item -Path "D:\cef\$file" -Destination "$TargetDir\$file" -Force
          }
          
          # Copy locales
          $dstLocales = "$TargetDir\locales"
          New-Item -ItemType Directory -Force -Path $dstLocales | Out-Null
          Copy-Item -Path "D:\cef\locales\*" -Destination $dstLocales -Force -Recurse

      # ── Build & Release ─────────────────────────────────────────────
      # tauri-action@v0 does the following automatically:
      #   1. Runs `cargo tauri build` with the provided args
      #   2. Signs installers with TAURI_SIGNING_PRIVATE_KEY
      #   3. Creates (or updates) a GitHub Release draft
      #   4. Uploads all bundle artifacts (.exe, .msi, .sig files)
      #   5. Generates and uploads latest.json for the updater endpoint
      #
      # release-please.yml runs with skip-github-release: true, so it only
      # bumps versions + CHANGELOG.md + pushes the vX.Y.Z tag. tauri-action
      # is the SOLE owner of the GitHub Release for this tag (as a draft,
      # gating the updater endpoint until a human publishes it).
      #
      # IMPORTANT: TAURI_SIGNING_PRIVATE_KEY must be set as a GitHub
      # repository secret and must match the pubkey in tauri.conf.json.
      # Generate a key pair with: pnpm tauri signer generate
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Path to the Tauri project relative to the repo root.
          # Required since our Tauri project lives in desktop/ not /.
          projectPath: desktop

          # Use the cargo-tauri fork CLI for bundling to package CEF runtime files
          tauriScript: cargo tauri

          # Tag / release config.
          # __VERSION__ is replaced by tauri-action with the version
          # from tauri.conf.json at build time.
          tagName: ${{ github.ref_name }}
          releaseName: "Ralph Meet ${{ github.ref_name }}"

          # We let release-please create the GitHub Release with the beautiful changelog.
          # tauri-action will simply find the existing release and upload assets to it.
          # We keep it as a draft during the upload process.
          releaseDraft: true
          prerelease: false

          # Use the NSIS (.exe) installer in latest.json instead of the
          # MSI. Our tauri.conf.json uses NSIS (currentUser install mode),
          # so this ensures the updater downloads the right file format.
          updaterJsonPreferNsis: true

          # Extra cargo feature flags for the CEF renderer + screen share.
          # These must match the features used in prod-deployed.ps1.
          args: ${{ matrix.args }}

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The artifacts are now fully uploaded. Publish the release and mark it as latest!
          gh release edit ${{ github.ref_name }} --draft=false --latest
