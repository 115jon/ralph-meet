name: Release Please

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
      - '.gitignore'
  # Manual re-run after a transient release-please backend failure
  # (e.g. "upstream connect error"). Avoids re-merging the PR.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # release-please owns version bumps, CHANGELOG.md, the GitHub Release, and the vX.Y.Z tag.
      # It will create the Release with proper changelog notes.
      # The pushed tag triggers desktop-release.yml which uploads the assets to the existing release.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # A PAT is required so the pushed tag triggers desktop-release.yml.
          # The default GITHUB_TOKEN would NOT trigger downstream workflows.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
