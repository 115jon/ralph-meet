name: Release Please

on:
  push:
    branches:
      - main
  # Manual re-run after a transient release-please backend failure
  # (e.g. "upstream connect error"). Avoids re-merging the PR.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # release-please owns version bumps, CHANGELOG.md, and the vX.Y.Z tag.
      # It does NOT create the GitHub Release: skip-github-release hands that
      # to tauri-action (desktop-release.yml) so the release can be a DRAFT,
      # gating the updater endpoint until a human publishes it.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # A PAT is required so the pushed tag triggers desktop-release.yml.
          # The default GITHUB_TOKEN would NOT trigger downstream workflows.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          skip-github-release: true

      # Because skip-github-release skips both the release AND the tag, we must
      # create the tag manually so desktop-release.yml triggers.
      - name: Checkout repo
        if: ${{ steps.release.outputs.releases_created }}
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Tag release
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.release.outputs.tag_name }}
          git push origin ${{ steps.release.outputs.tag_name }}
