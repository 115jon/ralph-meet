[[permission]]
identifier = "allow-get-screen-sources"
description = "Allows the frontend to enumerate desktop screen-share sources."
commands.allow = ["get_screen_sources"]

[[permission]]
identifier = "deny-get-screen-sources"
description = "Denies enumerating desktop screen-share sources."
commands.deny = ["get_screen_sources"]

[[permission]]
identifier = "allow-get-source-thumbnail"
description = "Allows the frontend to load thumbnails for desktop screen-share sources."
commands.allow = ["get_source_thumbnail"]

[[permission]]
identifier = "deny-get-source-thumbnail"
description = "Denies loading thumbnails for desktop screen-share sources."
commands.deny = ["get_source_thumbnail"]

[[permission]]
identifier = "allow-probe-hardware-video-encoders"
description = "Allows the frontend to inspect available hardware video encoders."
commands.allow = ["probe_hardware_video_encoders"]

[[permission]]
identifier = "deny-probe-hardware-video-encoders"
description = "Denies inspecting available hardware video encoders."
commands.deny = ["probe_hardware_video_encoders"]

[[permission]]
identifier = "allow-start-native-screen-share"
description = "Allows the frontend to start the native hardware screen-share publisher."
commands.allow = ["start_native_screen_share"]

[[permission]]
identifier = "deny-start-native-screen-share"
description = "Denies starting the native hardware screen-share publisher."
commands.deny = ["start_native_screen_share"]

[[permission]]
identifier = "allow-handle-sdp-answer"
description = "Allows the frontend to pass the SFU screen-share SDP answer to the native publisher."
commands.allow = ["handle_sdp_answer"]

[[permission]]
identifier = "deny-handle-sdp-answer"
description = "Denies passing SDP answers to the native publisher."
commands.deny = ["handle_sdp_answer"]

[[permission]]
identifier = "allow-wait-native-screen-share-connected"
description = "Allows the frontend to wait until the native screen-share publisher is flowing."
commands.allow = ["wait_native_screen_share_connected"]

[[permission]]
identifier = "deny-wait-native-screen-share-connected"
description = "Denies waiting for the native screen-share publisher."
commands.deny = ["wait_native_screen_share_connected"]

[[permission]]
identifier = "allow-stop-native-screen-share"
description = "Allows the frontend to stop the native screen-share publisher."
commands.allow = ["stop_native_screen_share"]

[[permission]]
identifier = "deny-stop-native-screen-share"
description = "Denies stopping the native screen-share publisher."
commands.deny = ["stop_native_screen_share"]

[[permission]]
identifier = "allow-get-native-screen-share-stats"
description = "Allows the frontend to read native screen-share session stats (capture mode + timing)."
commands.allow = ["get_native_screen_share_stats"]

[[permission]]
identifier = "deny-get-native-screen-share-stats"
description = "Denies reading native screen-share session stats."
commands.deny = ["get_native_screen_share_stats"]

[[permission]]
identifier = "allow-update-native-screen-quality"
description = "Allows the frontend to change the live native screen-share quality (resolution/fps/bitrate) in place."
commands.allow = ["update_native_screen_quality"]

[[permission]]
identifier = "deny-update-native-screen-quality"
description = "Denies changing the live native screen-share quality."
commands.deny = ["update_native_screen_quality"]

[[permission]]
identifier = "allow-start-preview-loopback"
description = "Allows the frontend to start a localhost RTCPeerConnection for hook-fed preview."
commands.allow = ["start_preview_loopback"]

[[permission]]
identifier = "deny-start-preview-loopback"
description = "Denies starting a localhost preview loopback."
commands.deny = ["start_preview_loopback"]

[[permission]]
identifier = "allow-handle-preview-loopback-answer"
description = "Allows the frontend to pass the SDP answer back to the preview loopback PC."
commands.allow = ["handle_preview_loopback_answer"]

[[permission]]
identifier = "deny-handle-preview-loopback-answer"
description = "Denies passing SDP answers to the preview loopback PC."
commands.deny = ["handle_preview_loopback_answer"]

[[permission]]
identifier = "allow-handle-preview-loopback-ice-candidate"
description = "Allows the frontend to forward ICE candidates to the preview loopback PC."
commands.allow = ["handle_preview_loopback_ice_candidate"]

[[permission]]
identifier = "deny-handle-preview-loopback-ice-candidate"
description = "Denies forwarding ICE candidates to the preview loopback PC."
commands.deny = ["handle_preview_loopback_ice_candidate"]

[[permission]]
identifier = "allow-stop-preview-loopback"
description = "Allows the frontend to stop the preview loopback connection."
commands.allow = ["stop_preview_loopback"]

[[permission]]
identifier = "deny-stop-preview-loopback"
description = "Denies stopping the preview loopback connection."
commands.deny = ["stop_preview_loopback"]

[[permission]]
identifier = "allow-get-hardware-acceleration"
description = "Allows the frontend to read the desktop renderer hardware acceleration preference."
commands.allow = ["get_hardware_acceleration"]

[[permission]]
identifier = "deny-get-hardware-acceleration"
description = "Denies reading the desktop renderer hardware acceleration preference."
commands.deny = ["get_hardware_acceleration"]

[[permission]]
identifier = "allow-set-hardware-acceleration"
description = "Allows the frontend to update the desktop renderer hardware acceleration preference."
commands.allow = ["set_hardware_acceleration"]

[[permission]]
identifier = "deny-set-hardware-acceleration"
description = "Denies updating the desktop renderer hardware acceleration preference."
commands.deny = ["set_hardware_acceleration"]

[[permission]]
identifier = "allow-set-close-to-tray"
description = "Allows the frontend to sync the close-to-tray desktop preference."
commands.allow = ["set_close_to_tray"]

[[permission]]
identifier = "deny-set-close-to-tray"
description = "Denies syncing the close-to-tray desktop preference."
commands.deny = ["set_close_to_tray"]

[[permission]]
identifier = "allow-set-start-minimized"
description = "Allows the frontend to sync the start-minimized desktop preference."
commands.allow = ["set_start_minimized"]

[[permission]]
identifier = "deny-set-start-minimized"
description = "Denies syncing the start-minimized desktop preference."
commands.deny = ["set_start_minimized"]

[[permission]]
identifier = "allow-set-title-bar-dark-mode"
description = "Allows the frontend to sync the Windows title bar theme."
commands.allow = ["set_title_bar_dark_mode"]

[[permission]]
identifier = "deny-set-title-bar-dark-mode"
description = "Denies syncing the Windows title bar theme."
commands.deny = ["set_title_bar_dark_mode"]
