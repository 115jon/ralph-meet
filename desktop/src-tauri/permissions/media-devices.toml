[[permission]]
identifier = "allow-get-native-audio-devices"
description = "Allows the frontend to read native audio device names for desktop media pickers."
commands.allow = ["get_native_audio_devices"]

[[permission]]
identifier = "deny-get-native-audio-devices"
description = "Denies reading native audio device names for desktop media pickers."
commands.deny = ["get_native_audio_devices"]

[[permission]]
identifier = "allow-get-native-video-devices"
description = "Allows the frontend to read native video device names for desktop media pickers."
commands.allow = ["get_native_video_devices"]

[[permission]]
identifier = "deny-get-native-video-devices"
description = "Denies reading native video device names for desktop media pickers."
commands.deny = ["get_native_video_devices"]
